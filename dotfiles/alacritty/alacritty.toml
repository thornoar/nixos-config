[cursor]
style = "Underline"

[env]
COLORTERM = "truecolor"
TERM = "xterm-256color"

[font]
size = 11

[font.bold]
family = "Hack"
style = "Bold"

[font.bold_italic]
family = "Hack"
style = "Bold Italic"

[font.italic]
family = "Hack"
style = "Italic"

[font.normal]
family = "Hack"
style = "Regular"

[window]
decorations = "full"
dynamic_title = true
startup_mode = "Windowed"

[window.dimensions]
columns = 120
lines = 65

[window.padding]
x = 6
y = 5
